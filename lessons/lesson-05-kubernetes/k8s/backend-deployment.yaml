# ============================================
# DEPLOYMENT — Контроллер для управления подами бэкенда
# ============================================
# Deployment — это инструкция для Kubernetes, как запускать и обновлять ваше приложение.
# Он автоматически создаёт указанное количество копий (реплик) подов и следит за их состоянием.
#
# Что он делает:
# - Запускает 2 одинаковых пода с бэкендом (реплики для надёжности и нагрузки)
# - Если под упал — автоматически перезапускает его
# - Позволяет обновлять приложение без простоя (rolling update)
#
# Pod — это минимальная единица в Kubernetes, контейнер с вашим приложением.

apiVersion: apps/v1         # Версия API для рабочих нагрузок (приложений)
kind: Deployment            # Тип ресурса — деплоимент (контроллер подов)
metadata:
  name: backend             # Имя деплоямента (к нему будем обращаться командами)
  namespace: learnreact     # Пространство имён (должно совпадать с namespace.yaml)
spec:                       # Спецификация — желаемое состояние
  replicas: 2               # Количество подов (копий приложения)
  selector:                 # Селектор — как находить поды, которыми управлять
    matchLabels:            # Ищем поды с меткой app=backend
      app: backend
  template:                 # Шаблон для создания новых подов
    metadata:
      labels:               # Метки — ключи для поиска и группировки подов
        app: backend        # Эта метка должна совпадать с selector.matchLabels
    spec:                   # Спецификация пода — что запускать внутри
      containers:
      - name: backend       # Имя контейнера (может быть любым)
        image: learnreact-backend:latest  # Docker-образ для запуска
        imagePullPolicy: Never  # Не скачивать образ из реестра (образ локальный)
        ports:
        - containerPort: 5000  # Порт, который слушает приложение внутри контейнера

        # ----------------------------------------
        # livenessProbe — «Датчик жизни»
        # ----------------------------------------
        # Если проверка не проходит — Kubernetes убивает под и создаёт новый.
        # Это нужно, если приложение «зависло» и не может восстановиться.
        livenessProbe:
          httpGet:
            path: /health   # URL для проверки (должен вернуть 200 OK)
            port: 5000      # Порт для проверки
          initialDelaySeconds: 30  # Ждём 30 секунд перед первой проверкой (на запуск)
          periodSeconds: 10        # Проверяем каждые 10 секунд

        # ----------------------------------------
        # readinessProbe — «Датчик готовности»
        # ----------------------------------------
        # Если проверка не проходит — Kubernetes не отправляет трафик на этот под.
        # Под работает, но ещё не готов принимать запросы (например, загружает данные).
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5   # Первая проверка через 5 секунд
          periodSeconds: 5         # Проверяем каждые 5 секунд
