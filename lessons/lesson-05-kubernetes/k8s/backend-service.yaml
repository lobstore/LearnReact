# ============================================
# SERVICE — Сетевой сервис для бэкенда
# ============================================
# Service — это стабильная «точка доступа» к подам.
# Поды временные: они могут перезапускаться, их IP меняются.
# Service даёт постоянное имя и IP, через которые можно обращаться к подам.
#
# Как это работает:
# - Service находит поды по меткам (selector)
# - Балансирует нагрузку между всеми найденными подами
# - Даёт стабильное DNS-имя: backend.learnreact.svc.cluster.local
#
# Тип сервиса (по умолчанию ClusterIP):
# - Доступен только внутри кластера
# - Внешний мир не может обратиться напрямую
# - Другие сервисы кластера могут обращаться по имени "backend"

apiVersion: v1              # Версия API (v1 — базовые ресурсы)
kind: Service               # Тип ресурса — сервис (сетевой балансировщик)
metadata:
  name: backend             # Имя сервиса (DNS-имя для обращения внутри кластера)
  namespace: learnreact     # Пространство имён
spec:
  # ----------------------------------------
  # sessionAffinity — Привязка сессии к клиенту
  # ----------------------------------------
  # ClientIP означает: все запросы с одного IP будут попадать на один и тот же под.
  # Это нужно, потому что наше приложение хранит состояние в памяти (in-memory).
  #
  # Без этой настройки:
  # - GET /api/todo → под A (получили список)
  # - POST /api/todo → под B (создали, но в поде A данных нет!)
  # - GET /api/todo → под A (данных не видно, хотя создали)
  #
  # С ClientIP:
  # - Все запросы от одного клиента идут на один под → данные согласованы
  sessionAffinity: ClientIP

  # ----------------------------------------
  # selector — Поиск подов для балансировки
  # ----------------------------------------
  selector:
    app: backend            # Находить поды с меткой app=backend

  # ----------------------------------------
  # ports — Правила маршрутизации трафика
  # ----------------------------------------
  ports:
  - port: 5000              # Порт сервиса (на который обращаются другие)
    targetPort: 5000        # Порт пода (на который пересылается трафик)
    # protocol: TCP         # По умолчанию TCP (можно не указывать)
