# ============================================
# SERVICE — Сетевой сервис для фронтенда
# ============================================
# Service для доступа к подам фронтенда.
# Другие сервисы (например, proxy) могут обращаться к фронтенду по имени "frontend".
#
# Тип ClusterIP (по умолчанию):
# - Доступен только внутри кластера
# - Внешний трафик идёт через proxy-сервис

apiVersion: v1
kind: Service
metadata:
  name: frontend            # Имя сервиса (DNS: frontend.learnrect.svc.cluster.local)
  namespace: learnreact
spec:
  # ----------------------------------------
  # selector — Поиск подов
  # ----------------------------------------
  selector:
    app: frontend           # Находить поды с меткой app=frontend

  # ----------------------------------------
  # ports — Правила маршрутизации
  # ----------------------------------------
  ports:
  - port: 3000              # Порт сервиса (на который обращаются)
    targetPort: 3000        # Порт пода (на который пересылается трафик)
