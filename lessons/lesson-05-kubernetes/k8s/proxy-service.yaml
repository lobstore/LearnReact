# ============================================
# SERVICE — Публичный сервис для доступа извне (NodePort)
# ============================================
# Service типа NodePort открывает доступ к приложению из внешней сети.
# Он открывает указанный порт на КАЖДОЙ ноде кластера.
#
# Как это работает:
# - minikube ip:30080 → нода кластера:30080 → proxy:80 → frontend/backend
# - Все запросы снаружи попадают на proxy, который распределяет их
#
# Типы сервисов:
# - ClusterIP  — только внутри кластера (по умолчанию)
# - NodePort   — порт на каждой ноде (для разработки)
# - LoadBalancer — внешний балансировщик (для продакшена в облаке)

apiVersion: v1
kind: Service
metadata:
  name: proxy               # Имя сервиса
  namespace: learnreact
spec:
  # ----------------------------------------
  # type: NodePort — Открыть порт на ноде
  # ----------------------------------------
  # Это делает сервис доступным извне кластера
  type: NodePort

  # ----------------------------------------
  # selector — Поиск подов proxy
  # ----------------------------------------
  selector:
    app: proxy              # Находить поды с меткой app=proxy

  # ----------------------------------------
  # ports — Правила маршрутизации
  # ----------------------------------------
  ports:
  - port: 80                # Порт сервиса (внутренний)
    targetPort: 80          # Порт пода (куда пересылать)
    nodePort: 30080         # Порт на ноде кластера (внешний доступ)
                            # Диапазон для NodePort: 30000-32767

# ============================================
# КАК ПОЛЬЗОВАТЬСЯ:
# ============================================
# 1. Узнать IP ноды: minikube ip
# 2. Открыть в браузере: http://<minikube-ip>:30080
#
# Или через port-forward (без NodePort):
#   kubectl port-forward -n learnreact svc/proxy 8080:80
#   Затем открыть: http://localhost:8080
