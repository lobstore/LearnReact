# ============================================
# NAMESPACE — Пространство имён
# ============================================
# Namespace — это виртуальный кластер внутри реального кластера Kubernetes.
# Он изолирует ресурсы вашего приложения от других приложений.
#
# Зачем это нужно:
# - Все ресурсы (поды, сервисы, деплоименты) будут в отдельной "песочнице"
# - Можно применять политики безопасности и квоты на весь namespace
# - Удобно для разделения окружений: dev, test, prod
#
# Пример: kubectl get pods -n learnreact (показать поды только в этом namespace)

apiVersion: v1              # Версия API Kubernetes (v1 — базовая версия)
kind: Namespace             # Тип ресурса — пространство имён
metadata:                   # Метаданные объекта
  name: learnreact          # Имя namespace (используется во всех ресурсах ниже)
