# ==============================================================================
# GitLab CI/CD Pipeline для LearnReact
# ==============================================================================
#
# ЧТО ТАКОЕ GITLAB CI/CD?
# ------------------------
# GitLab CI/CD — это инструмент для автоматизации процесса разработки.
# Вместо того чтобы вручную собирать, тестировать и разворачивать приложение,
# вы настраиваете автоматический процесс, который делает это за вас.
#
# КАК ЭТО РАБОТАЕТ?
# -----------------
# 1. Вы делаете push кода в GitLab
# 2. GitLab видит изменения и запускает этот пайплайн
# 3. Пайплайн выполняет задачи по порядку (проверка, тесты, сборка, деплой)
# 4. Если всё успешно — ваше приложение обновляется на сервере
#
# ЧТО ТАКОЕ DOCKER И KUBERNETES?
# ------------------------------
# Docker — это способ "упаковать" приложение со всеми зависимостями в контейнер.
# Контейнер — это как виртуальная машина, но легче и быстрее.
#
# Kubernetes — это система управления контейнерами.
# Она запускает контейнеры, следит за их здоровьем, масштабирует при нагрузке.
#
# ==============================================================================

# ------------------------------------------------------------------------------
# ЭТАПЫ ПАПЕЛАЙНА (stages)
# ------------------------------------------------------------------------------
# Пайплайн разделён на этапы. Этапы выполняются ПОСЛЕДОВАТЕЛЬНО:
# сначала lint, потом test, потом build, и т.д.
#
# Внутри одного этапа задачи выполняются ПАРАЛЛЕЛЬНО:
# например, lint-backend и lint-frontend запустятся одновременно.
#
# Если задача на этапе failed (провалилась) — следующие этапы не запускаются.
stages:
  - lint    # 1. Проверка кода на соответствие стандартам оформления
  - test    # 2. Сборка проекта и запуск тестов
  - build   # 3. Создание Docker-образов (упаковка приложения)
  - push    # 4. Отправка образов в хранилище (GitLab Container Registry)
  - deploy  # 5. Развёртывание в Kubernetes (запуск на сервере)

# ------------------------------------------------------------------------------
# ПЕРЕМЕННЫЕ (variables)
# ------------------------------------------------------------------------------
# Переменные — это как "константы" в программировании.
# Они хранят значения, которые используются в нескольких местах.
#
# В GitLab CI/CD есть встроенные переменные:
#   $CI_PROJECT_PATH — путь к проекту (например, username/learnreact)
#   $CI_COMMIT_SHA — хеш коммита (уникальный идентификатор)
#   $CI_REGISTRY_USER — логин от Docker-реестрия
#   $CI_REGISTRY_PASSWORD — пароль от Docker-реестрия
#
variables:
  # Адрес Docker-реестрия GitLab
  # Это как "папка", куда будут складываться ваши Docker-образы
  DOCKER_REGISTRY: "registry.gitlab.com"
  
  # Путь к проекту внутри реестрия
  # GitLab автоматически подставит сюда ваш username и название проекта
  DOCKER_REGISTRY_PATH: "$CI_PROJECT_PATH"

  # --------------------------------------------------------------------------
  # Настройки для бэкенда (.NET)
  # --------------------------------------------------------------------------
  # Полное имя Docker-образа для бэкенда
  # Пример: registry.gitlab.com/username/learnreact/backend
  BACKEND_IMAGE: "$DOCKER_REGISTRY/$DOCKER_REGISTRY_PATH/backend"
  
  # Путь к Dockerfile для бэкенда
  # Dockerfile — это "рецепт" сборки Docker-образа
  BACKEND_DOCKERFILE: "LearnReact.Api/Dockerfile"
  
  # Контекст сборки — папка, в которой будет запускаться сборка
  BACKEND_CONTEXT: "LearnReact.Api"

  # --------------------------------------------------------------------------
  # Настройки для фронтенда (React)
  # --------------------------------------------------------------------------
  FRONTEND_IMAGE: "$DOCKER_REGISTRY/$DOCKER_REGISTRY_PATH/frontend"
  FRONTEND_DOCKERFILE: "LearnReact.Frontend/Dockerfile"
  FRONTEND_CONTEXT: "LearnReact.Frontend"

  # --------------------------------------------------------------------------
  # Настройки Kubernetes
  # --------------------------------------------------------------------------
  # Namespace — это как "отдельная папка" в Kubernetes для вашего приложения
  # Все ресурсы (поды, сервисы) будут созданы внутри этого namespace
  KUBERNETES_NAMESPACE: "learnreact"
  
  # Название приложения (используется в метках)
  KUBERNETES_APP: "learnreact"

  # --------------------------------------------------------------------------
  # Настройки .NET
  # --------------------------------------------------------------------------
  # Режим работы: Production (продакшен) или Development (разработка)
  # В Production режиме отключаются некоторые функции отладки
  DOTNET_ENVIRONMENT: "Production"

# ==============================================================================
# ЭТАП 1: ПРОВЕРКА КОДА (LINT)
# ==============================================================================
#
# ЧТО ТАКОЕ LINT?
# ---------------
# Lint — это автоматическая проверка кода на соответствие стандартам.
# Например: правильные ли отступы, нет ли лишних пробелов, 
# соблюдается ли стиль кода.
#
# Зачем это нужно?
# Чтобы код всех разработчиков выглядел одинаково и его было легко читать.
#
# Если lint не прошёл — пайплайн останавливается, код не попадает дальше.

# ------------------------------------------------------------------------------
# Проверка бэкенда (.NET)
# ------------------------------------------------------------------------------
lint-backend:
  # Указываем, что эта задача относится к этапу lint
  stage: lint
  
  # Образ Docker, в котором будет запускаться задача
  # mcr.microsoft.com/dotnet/sdk:8.0 — это официальный образ с .NET SDK 8.0
  # GitLab скачает этот образ и запустит в нём команду из script
  image: mcr.microsoft.com/dotnet/sdk:8.0
  
  # Команды, которые будут выполнены
  script:
    # Переходим в папку с бэкендом
    # cd — change directory (сменить директорию)
    - cd LearnReact.Api
    
    # dotnet format — команда проверки форматирования кода
    # --verify-no-changes — проверить и сообщить, если есть нарушения
    # Если код отформатирован неправильно — команда вернёт ошибку
    - dotnet format --verify-no-changes
  
  # Правила запуска задачи
  rules:
    # changes: означает "запускать только если изменились эти файлы"
    # Это экономит ресурсы — не запускать проверку, если меняли только фронтенд
    - changes:
        - "LearnReact.Api/**/*"  # Любые файлы в папке LearnReact.Api
        - "*.sln"                # Файлы решения (.sln)
        - "*.csproj"             # Файлы проекта (.csproj)

# ------------------------------------------------------------------------------
# Проверка фронтенда (React)
# ------------------------------------------------------------------------------
lint-frontend:
  stage: lint
  # node:18-alpine — образ с Node.js 18 на базе Alpine Linux
  # Alpine — очень лёгкий дистрибутив Linux, образ весит мало
  image: node:18-alpine
  script:
    - cd LearnReact.Frontend
    # npm ci — "clean install", устанавливает зависимости из package-lock.json
    # Работает быстрее и надёжнее, чем npm install
    - npm ci
    # Если в проекте настроен ESLint (проверка JavaScript-кода),
    # можно раскомментировать следующую строку:
    # - npm run lint
  rules:
    - changes:
        - "LearnReact.Frontend/**/*"  # Файлы фронтенда
        - "package.json"              # Зависимости проекта
        - "package-lock.json"         # Зафиксированные версии зависимостей

# ==============================================================================
# ЭТАП 2: ТЕСТИРОВАНИЕ
# ==============================================================================
#
# ЧТО ТАКОЕ ТЕСТЫ?
# ----------------
# Тесты — это код, который проверяет, что ваше приложение работает правильно.
# Например: "если отправить такой-то запрос, должен вернуться такой-то ответ".
#
# На этом этапе:
# 1. Устанавливаются все зависимости (библиотеки)
# 2. Компилируется/собирается проект
# 3. Запускаются тесты (если они есть)
#
# Если сборка или тесты не прошли — пайплайн останавливается.

# ------------------------------------------------------------------------------
# Тестирование бэкенда
# ------------------------------------------------------------------------------
test-backend:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:8.0
  script:
    # dotnet restore — скачивает все NuGet-пакеты (библиотеки),
    # которые указаны в .csproj файле
    # Как npm install, но для .NET
    - cd LearnReact.Api
    - dotnet restore
    
    # dotnet build — компилирует код в исполняемые файлы
    # --configuration Release — оптимизированная версия для продакшена
    # (в отличие от Debug, которая предназначена для отладки)
    - dotnet build --configuration Release
    
    # Если в проекте есть unit-тесты, раскомментировать:
    # dotnet test — запускает тесты
    # --collect:"XPlat Code Coverage" — собирает статистику, какой % кода покрыт тестами
    # - dotnet test --configuration Release --collect:"XPlat Code Coverage"
  rules:
    - changes:
        - "LearnReact.Api/**/*"
        - "*.sln"
        - "*.csproj"

# ------------------------------------------------------------------------------
# Тестирование фронтенда
# ------------------------------------------------------------------------------
test-frontend:
  stage: test
  image: node:18-alpine
  script:
    - cd LearnReact.Frontend
    # npm ci — устанавливает зависимости (как npm install, но строже)
    # Использует package-lock.json для точной установки версий
    - npm ci
    
    # npm run build — запускает команду "build" из package.json
    # В нашем случае это "vite build" — сборка React-приложения
    # Vite упаковывает все JS/CSS файлы в оптимизированную версию
    - npm run build
    
    # Если сборка прошла без ошибок — тест пройден ✓
  rules:
    - changes:
        - "LearnReact.Frontend/**/*"
        - "package.json"
        - "package-lock.json"

# ==============================================================================
# ЭТАП 3: СБОРКА DOCKER-ОБРАЗОВ
# ==============================================================================
#
# ЧТО ТАКОЕ DOCKER-ОБРАЗ?
# -----------------------
# Образ — это "слепок" вашего приложения со всеми зависимостями.
# Из образа потом запускаются контейнеры.
#
# КАК СОБИРАЕТСЯ ОБРАЗ?
# ---------------------
# Docker читает Dockerfile и выполняет команды по порядку:
# 1. Берёт базовый образ (например, .NET SDK или Node.js)
# 2. Копирует туда ваш код
# 3. Устанавливает зависимости
# 4. Запускает сборку
# 5. Сохраняет результат как образ
#
# ЗАЧЕМ НУЖНО ДВА ТЕГА?
# ---------------------
# $CI_COMMIT_SHA — уникальный хеш коммита (например, a1b2c3d4)
#   Позволяет откатиться к любой предыдущей версии
#
# latest — всегда указывает на последнюю собранную версию
#   Удобно для быстрого развёртывания последней версии

# ------------------------------------------------------------------------------
# Сборка бэкенда
# ------------------------------------------------------------------------------
build-backend:
  stage: build
  # docker:24.0 — образ с Docker версии 24.0
  image: docker:24.0
  
  # services — дополнительные контейнеры, которые нужны для работы
  # docker:24.0-dind — Docker-in-Docker
  # Позволяет запускать Docker-команды внутри GitLab CI
  # (потому что сам GitLab CI уже работает в контейнере)
  services:
    - docker:24.0-dind
  
  # before_script — команды, которые выполняются ПЕРЕД основным script
  # Здесь мы логинимся в Docker-реестрий, чтобы потом иметь право
  # загружать туда образы
  before_script:
    # docker login — вход в реестрий
    # $CI_REGISTRY_USER и $CI_REGISTRY_PASSWORD — автоматически
    # предоставляемые GitLab учётные данные
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$DOCKER_REGISTRY"
  
  # script — основные команды задачи
  script:
    # docker build — собрать Docker-образ
    # -t "$BACKEND_IMAGE:$CI_COMMIT_SHA" — тегировать образ
    #   Пример: registry.gitlab.com/user/learnreact/backend:a1b2c3d4
    # -f "$BACKEND_DOCKERFILE" — путь к Dockerfile
    # "$BACKEND_CONTEXT" — папка контекста сборки
    - docker build -t "$BACKEND_IMAGE:$CI_COMMIT_SHA" -f "$BACKEND_DOCKERFILE" "$BACKEND_CONTEXT"
    
    # Собираем тот же образ с тегом latest
    # latest — это как "последняя версия" по умолчанию
    - docker build -t "$BACKEND_IMAGE:latest" -f "$BACKEND_DOCKERFILE" "$BACKEND_CONTEXT"
  
  # rules — условия запуска задачи
  rules:
    # if: $CI_COMMIT_BRANCH == "main"
    # Запускать, если пуш сделан в ветку main (продакшен)
    - if: $CI_COMMIT_BRANCH == "main"
    
    # if: $CI_COMMIT_BRANCH == "develop"
    # Запускать, если пуш сделан в ветку develop (тестирование)
    - if: $CI_COMMIT_BRANCH == "develop"
    
    # if: $CI_COMMIT_TAG
    # Запускать, если создан тег (например, v1.0.0)
    # Теги обычно используются для релизов
    - if: $CI_COMMIT_TAG

# ------------------------------------------------------------------------------
# Сборка фронтенда
# ------------------------------------------------------------------------------
build-frontend:
  stage: build
  image: docker:24.0
  services:
    - docker:24.0-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$DOCKER_REGISTRY"
  script:
    - docker build -t "$FRONTEND_IMAGE:$CI_COMMIT_SHA" -f "$FRONTEND_DOCKERFILE" "$FRONTEND_CONTEXT"
    - docker build -t "$FRONTEND_IMAGE:latest" -f "$FRONTEND_DOCKERFILE" "$FRONTEND_CONTEXT"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_TAG

# ==============================================================================
# ЭТАП 4: ОТПРАВКА В DOCKER REGISTRY
# ==============================================================================
#
# ЧТО ТАКОЕ DOCKER REGISTRY?
# --------------------------
# Registry — это хранилище Docker-образов.
# Как GitHub для кода, только для Docker-образов.
#
# GitLab имеет встроенный registry: registry.gitlab.com
#
# ЗАЧЕМ ОТПРАВЛЯТЬ ОБРАЗЫ ТУДА?
# ----------------------------
# Чтобы Kubernetes мог скачать эти образы и запустить их на сервере.
# Kubernetes должен иметь доступ к образам — поэтому их загружают в registry.

# ------------------------------------------------------------------------------
# Отправка бэкенда
# ------------------------------------------------------------------------------
push-backend:
  stage: push
  image: docker:24.0
  services:
    - docker:24.0-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$DOCKER_REGISTRY"
  script:
    # docker push — загрузить образ в registry
    # После этой команды образ становится доступен по URL:
    # registry.gitlab.com/user/learnreact/backend:a1b2c3d4
    - docker push "$BACKEND_IMAGE:$CI_COMMIT_SHA"
    
    # Загружаем также версию latest
    - docker push "$BACKEND_IMAGE:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_TAG
  
  # needs — зависимости задачи
  # Эта задача НЕ запустится, пока не завершится build-backend
  # Это гарантирует правильный порядок выполнения
  needs:
    - build-backend

# ------------------------------------------------------------------------------
# Отправка фронтенда
# ------------------------------------------------------------------------------
push-frontend:
  stage: push
  image: docker:24.0
  services:
    - docker:24.0-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$DOCKER_REGISTRY"
  script:
    - docker push "$FRONTEND_IMAGE:$CI_COMMIT_SHA"
    - docker push "$FRONTEND_IMAGE:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_TAG
  needs:
    - build-frontend

# ==============================================================================
# ЭТАП 5: РАЗВЁРТЫВАНИЕ В KUBERNETES
# ==============================================================================
#
# ЧТО ТАКОЕ KUBERNETES?
# ---------------------
# Kubernetes (часто называют K8s) — это система управления контейнерами.
# Она умеет:
#   • Запускать контейнеры на серверах
#   • Следить, чтобы контейнеры работали
#   • Перезапускать упавшие контейнеры
#   • Масштабировать (запускать больше копий при нагрузке)
#   • Распределять трафик между контейнерами
#
# ОСНОВНЫЕ ПОНЯТИЯ KUBERNETES:
# ----------------------------
# Pod (под) — минимальная единица, один или несколько контейнеров
#
# Deployment — описывает, какие поды должны быть запущены
#              и как их обновлять
#
# Service — обеспечивает доступ к подам (например, извне кластера)
#
# Namespace — изолированное пространство для ресурсов
#             как "папка" для ресурсов Kubernetes
#
# Ingress — правило маршрутизации внешнего трафика
#           (например, example.com → frontend, example.com/api → backend)
#
# kubectl — командная строка для управления Kubernetes
#           (как git для Git)

# ------------------------------------------------------------------------------
# Развёртывание в STAGING (тестовое окружение)
# ------------------------------------------------------------------------------
#
# ЧТО ТАКОЕ STAGING?
# ------------------
# Staging — это тестовый сервер, копия продакшена.
# Здесь можно проверить, что всё работает, прежде чем показывать пользователям.
#
# Ветка develop → staging
# Ветка main → production
#
deploy-staging:
  stage: deploy
  
  # bitnami/kubectl:latest — образ с утилитой kubectl
  # kubectl — это инструмент для управления Kubernetes
  # Через него мы отправляем команды кластеру
  image: bitnami/kubectl:latest
  
  script:
    # ------------------------------------------------------------------------
    # ШАГ 1: Обновляем Kubernetes-манифесты
    # ------------------------------------------------------------------------
    # Манифесты — это YAML-файлы, которые описывают, что должно быть запущено
    # в Kubernetes ( Deployment'ы, Service'ы, и т.д.)
    #
    # Нам нужно заменить "latest" на конкретную версию коммита,
    # чтобы запустить именно ту версию, которую мы только что собрали
    #
    # sed — команда для поиска и замены текста в файлах
    # -i — редактировать файл "на месте" (in-place)
    # "s|старое|новое|g" — заменить все вхождения "старое" на "новое"
    
    # Заменяем имя образа бэкенда на только что собранный
    - sed -i "s|image:.*backend:.*|image: $BACKEND_IMAGE:$CI_COMMIT_SHA|g" k8s/backend-deployment.yml
    
    # Заменяем имя образа фронтенда на только что собранный
    - sed -i "s|image:.*frontend:.*|image: $FRONTEND_IMAGE:$CI_COMMIT_SHA|g" k8s/frontend-deployment.yml

    # ------------------------------------------------------------------------
    # ШАГ 2: Применяем манифесты в Kubernetes
    # ------------------------------------------------------------------------
    # kubectl apply -f файл — создать или обновить ресурсы из файла
    # Ресурсы применяются по порядку, потому что есть зависимости:
    #   нельзя создать Deployment без существующего Namespace
    
    - kubectl apply -f k8s/namespace.yml        # 1. Создаём namespace (пространство имён)
    - kubectl apply -f k8s/configmap.yml        # 2. ConfigMap — переменные окружения
    - kubectl apply -f k8s/secrets.yml          # 3. Secrets — секреты (пароли, ключи)
    - kubectl apply -f k8s/nginx-configmap.yml  # 4. Конфигурация nginx
    - kubectl apply -f k8s/backend-deployment.yml # 5. Запускаем бэкенд (Deployment)
    - kubectl apply -f k8s/frontend-deployment.yml # 6. Запускаем фронтенд (Deployment)
    - kubectl apply -f k8s/backend-service.yml  # 7. Service для доступа к бэкенду
    - kubectl apply -f k8s/frontend-service.yml # 8. Service для доступа к фронтенду
    - kubectl apply -f k8s/backend-hpa.yml      # 9. HPA — авто-масштабирование
    - kubectl apply -f k8s/ingress.yml          # 10. Ingress — внешний доступ

    # ------------------------------------------------------------------------
    # ШАГ 3: Ждём завершения развёртывания
    # ------------------------------------------------------------------------
    # kubectl rollout status — ждать, пока все поды обновятся и станут готовы
    # deployment/learnreact-backend — имя Deployment
    # -n $KUBERNETES_NAMESPACE — в namespace learnreact
    - kubectl rollout status deployment/learnreact-backend -n $KUBERNETES_NAMESPACE
    - kubectl rollout status deployment/learnreact-frontend -n $KUBERNETES_NAMESPACE

    # ------------------------------------------------------------------------
    # ШАГ 4: Показываем результат
    # ------------------------------------------------------------------------
    # kubectl get — получить список ресурсов
    # pods — поды (контейнеры)
    # services — сервисы (точки доступа)
    - kubectl get pods -n $KUBERNETES_NAMESPACE    # Показать все запущенные поды
    - kubectl get services -n $KUBERNETES_NAMESPACE # Показать все сервисы
  
  # environment — информация об окружении в GitLab
  # После деплоя в GitLab появится ссылка на staging-версию
  environment:
    name: staging  # Название окружения
    url: https://staging.your-domain.com  # URL (после настройки Ingress)
  
  # rules — когда запускать эту задачу
  rules:
    # Автоматически разворачивать только при пуше в ветку develop
    - if: $CI_COMMIT_BRANCH == "develop"

# ------------------------------------------------------------------------------
# Развёртывание в PRODUCTION (продакшен)
# ------------------------------------------------------------------------------
#
# ЧТО ТАКОЕ PRODUCTION?
# ---------------------
# Production — это "боевой" сервер, который видят пользователи.
#
# ВАЖНО: when: manual означает, что деплой требует ручного подтверждения!
# После успешного прохождения всех этапов в GitLab появится кнопка "Play".
# Нужно нажать её, чтобы запустить деплой на production.
#
# Это защита от случайного обновления продакшена.

deploy-production:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    # Те же действия, что и для staging
    - sed -i "s|image:.*backend:.*|image: $BACKEND_IMAGE:$CI_COMMIT_SHA|g" k8s/backend-deployment.yml
    - sed -i "s|image:.*frontend:.*|image: $FRONTEND_IMAGE:$CI_COMMIT_SHA|g" k8s/frontend-deployment.yml

    - kubectl apply -f k8s/namespace.yml
    - kubectl apply -f k8s/configmap.yml
    - kubectl apply -f k8s/secrets.yml
    - kubectl apply -f k8s/nginx-configmap.yml
    - kubectl apply -f k8s/backend-deployment.yml
    - kubectl apply -f k8s/frontend-deployment.yml
    - kubectl apply -f k8s/backend-service.yml
    - kubectl apply -f k8s/frontend-service.yml
    - kubectl apply -f k8s/backend-hpa.yml
    - kubectl apply -f k8s/ingress.yml

    - kubectl rollout status deployment/learnreact-backend -n $KUBERNETES_NAMESPACE
    - kubectl rollout status deployment/learnreact-frontend -n $KUBERNETES_NAMESPACE

    - kubectl get pods -n $KUBERNETES_NAMESPACE
    - kubectl get services -n $KUBERNETES_NAMESPACE
  environment:
    name: production
    url: https://your-domain.com
  rules:
    # Запускать для ветки main (основная ветка)
    # или для тегов (релизные версии, например v1.0.0)
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  
  # when: manual — ТРЕБУЕТСЯ РУЧНОЕ ПОДТВЕРЖДЕНИЕ
  # В GitLab CI/CD появится кнопка "Play" после успешного прохождения
  # всех предыдущих этапов. Нужно нажать её для запуска деплоя.
  when: manual
  
  # needs — зависимости
  # Production-деплой запускается только после успешной отправки
  # обоих образов в registry
  needs:
    - push-backend
    - push-frontend

# ==============================================================================
# КАК ИСПОЛЬЗОВАТЬ ЭТОТ ФАЙЛ?
# ==============================================================================
#
# 1. Запушьте код в GitLab:
#    git add .
#    git commit -m "Initial commit"
#    git push origin main
#
# 2. Откройте GitLab, перейдите в проект → CI/CD → Pipelines
#    Вы увидите запущенный пайплайн
#
# 3. Наблюдайте за выполнением задач
#    Зелёная галочка ✓ — успешно
#    Красный крестик ✗ — ошибка
#
# 4. Для production-деплоя нажмите кнопку "Play"
#
# 5. После завершения откройте URL из environment
#
# ==============================================================================
#
# ЧТО НАСТРОИТЬ ПЕРЕД ИСПОЛЬЗОВАНИЕМ?
# -----------------------------------
# 1. В k8s/ingress.yml замените your-domain.com на ваш домен
#
# 2. В k8s/secrets.yml укажите реальные пароли и ключи
#
# 3. В GitLab Settings → CI/CD → Variables добавьте:
#    - KUBECONFIG (конфиг для доступа к Kubernetes)
#    - DOCKER_HOST (если используется внешний Docker)
#
# 4. Убедитесь, что ваш Kubernetes кластер доступен из GitLab CI
#
# ==============================================================================
