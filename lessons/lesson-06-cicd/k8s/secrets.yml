apiVersion: v1
kind: Secret
metadata:
  name: learnreact-secrets
  namespace: learnreact
type: Opaque
stringData:
  # Database connection string (example for PostgreSQL)
  # Change to your actual connection string
  ConnectionStrings__DefaultConnection: "Host=localhost;Database=learnreact;Username=postgres;Password=changeme"
  
  # JWT Secret for authentication (if used)
  # Generate a strong random string for production
  Jwt__Secret: "your-super-secret-jwt-key-change-in-production"
  
  # API Key (if needed for external services)
  ApiKey: "your-api-key-here"
