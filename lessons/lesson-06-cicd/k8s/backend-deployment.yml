apiVersion: apps/v1
kind: Deployment
metadata:
  name: learnreact-backend
  namespace: learnreact
  labels:
    app: learnreact-backend
    tier: backend
spec:
  replicas: 2  # Number of backend pod replicas
  selector:
    matchLabels:
      app: learnreact-backend
  template:
    metadata:
      labels:
        app: learnreact-backend
        tier: backend
    spec:
      containers:
        - name: backend
          image: your-gitlab-registry/learnreact/backend:latest  # Replace with your registry
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: learnreact-config
            - secretRef:
                name: learnreact-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
      volumes:
        - name: tmp-volume
          emptyDir: {}
      restartPolicy: Always
