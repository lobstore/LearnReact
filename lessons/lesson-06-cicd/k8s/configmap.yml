apiVersion: v1
kind: ConfigMap
metadata:
  name: learnreact-config
  namespace: learnreact
data:
  # Backend configuration
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:5000"
  
  # Frontend configuration (nginx)
  NGINX_HOST: "localhost"
  NGINX_PORT: "80"
  
  # API URL for frontend (internal cluster DNS)
  API_URL: "http://learnreact-backend-service:5000"
